<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Portfolio: {{ portfolio.name }}</h1>
<p style="text-align:center;">
    <a href="{{ url_for('edit_portfolio') }}">Edit Portfolio</a> |
    <a href="{{ url_for('add_mf') }}">Add MF</a> |
    <a href="{{ url_for('logout') }}">Logout</a>
</p>

<table>
    <tr>
        <th>MF Name</th>
        <th>Stock Count</th>
        <th>View</th>
        <th>Delete</th>
    </tr>
    {% for mf in portfolio.mutual_funds %}
    <tr>
        <td>{{ mf.name }}</td>
        <td>{{ mf.stocks|length }}</td>
        <td><a href="{{ url_for('mf_dashboard', mf_id=mf.id) }}">View</a></td>
        <td><a href="{{ url_for('delete_mf', mf_id=mf.id) }}">Delete</a></td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
